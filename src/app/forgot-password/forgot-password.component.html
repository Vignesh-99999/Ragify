<div class="forgot-page">
  <div class="forgot-password-container">

    <!-- HEADER -->
    <div class="forgot-header">
      <div class="lock-icon">🔐</div>
      <h2>Forgot Password</h2>
      <p>We’ll help you reset it securely</p>
    </div>

    <!-- ================= SEND OTP ================= -->
    <div *ngIf="!otpSent" class="input-group fade-in">

      <input
        type="email"
        class="form-input"
        [(ngModel)]="email"
        placeholder="Email address"
      />

      <span *ngIf="emailInvalid" class="input-error-message">
        Please enter a valid email
      </span>

      <button class="submit-btn" (click)="sendOtp()" [disabled]="otpLoading">
        <span *ngIf="!otpLoading">Send OTP</span>
        <span *ngIf="otpLoading" class="loader"></span>
      </button>
    </div>

    <!-- ================= VERIFY OTP ================= -->
    <div *ngIf="otpSent && !resetStage" class="otp-section slide-up">

      <p class="otp-label">Enter 6-digit OTP</p>

      <div class="otp-inputs">
        <input
          *ngFor="let _ of otpBoxes; let i = index"
          type="text"
          maxlength="1"
          class="otp-input"
          (input)="onOtpInput($event, i)"
        />
      </div>

      <button class="submit-btn" (click)="verifyOtp()">Verify OTP</button>

      <!-- TIMER -->
      <p class="resend-text">
        <span *ngIf="timer > 0">Resend OTP in {{ timer }}s</span>
        <a *ngIf="timer === 0" (click)="resendOtp()">Resend OTP</a>
      </p>

    </div>

    <!-- ================= RESET PASSWORD ================= -->
    <div *ngIf="resetStage" class="input-group slide-up">

      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="New Password"
        [(ngModel)]="newPassword"
        [ngClass]="{ 'invalid': passwordInvalid }"
        class="form-input"
      />

      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Confirm Password"
        [(ngModel)]="confirmPassword"
        [ngClass]="{ 'invalid': confirmPasswordInvalid }"
        class="form-input"
      />

      <span class="toggle-password" (click)="togglePassword()">
        {{ showPassword ? 'Hide Passwords 👁️' : 'Show Passwords 👁️' }}
      </span>

      <button class="submit-btn success" (click)="resetPassword()">
        Reset Password
      </button>
    </div>

    <!-- ================= BACK TO LOGIN ================= -->
    <button *ngIf="!resetStage" class="back-btn" (click)="backToLogin()">
      ← Back to Login
    </button>

  </div>
</div>
