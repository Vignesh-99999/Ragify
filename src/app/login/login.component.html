<div class="ai-container">
  <div class="video-wrapper">
    <video 
  autoplay 
  muted 
  loop 
  playsinline 
  preload="auto"
  class="bg-video">
  <source src="assets/video/stock-footage-robot-thinking-using-virtual-interface-ai-chatbot.mp4" type="video/mp4">
</video>
    <div class="overlay"></div>
  </div>

  <main class="auth-container glass-morphism">
    <div class="form-wrapper">

      <h2 class="auth-title">Welcome Back!</h2>
      <p class="auth-subtitle">Sign in to continue</p>

      <div class="input-group">
        <select [(ngModel)]="loginRole" class="form-input">
          <option value="user">User</option>
          <option value="researcher">Researcher</option>
          <option value="admin">Admin</option>
        </select>
        <div class="glow-border"></div>
      </div>

      <!-- ================= USER LOGIN ================= -->
      <div *ngIf="loginRole === 'user'">

        <div class="login-type-selector">
          <button class="type-btn" [class.active]="loginType === 'password'" (click)="loginType='password'">🔐 Password</button>
          <button class="type-btn" [class.active]="loginType === 'google'" (click)="loginType='google'">🌐 OTP</button>
        </div>

        <!-- ===== PASSWORD LOGIN ===== -->
        <div *ngIf="loginType === 'password'" class="login-form">
          <input class="form-input" placeholder="Phone Number" [(ngModel)]="phone">
          <input class="form-input" [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="password">

          <button class="submit-btn" (click)="login()">LOGIN</button>

          <div class="divider"><span>OR</span></div>

          <button class="google-btn" (click)="loginWithGooglePopup()">
            <img src="assets/img/google-icon.png" alt="">
            Login with Google
          </button>
        </div>

        <!-- ===== GMAIL / OTP LOGIN ===== -->
        <div *ngIf="loginType === 'google'" class="login-form">
          <input class="form-input" placeholder="Email" [(ngModel)]="email">
          <button class="submit-btn" (click)="sendEmailOtp()">Send OTP</button>

          <input *ngIf="otpSent" class="form-input" placeholder="Enter OTP" [(ngModel)]="otp">
          <button *ngIf="otpSent" class="submit-btn" (click)="verifyEmailOtp()">Verify OTP</button>

          <!-- GOOGLE LOGIN ALWAYS AFTER MAIN ACTION -->
          <div class="divider"><span>OR</span></div>

          <button class="google-btn" (click)="loginWithGooglePopup()">
            <img src="assets/img/google-icon.png" alt="">
            Login with Google
          </button>
        </div>
      </div>

      <!-- ================= RESEARCHER LOGIN ================= -->
      <div *ngIf="loginRole === 'researcher'">

        <div class="login-type-selector">
          <button class="type-btn" [class.active]="loginType === 'password'" (click)="loginType='password'">🔐 Password</button>
          <button class="type-btn" [class.active]="loginType === 'google'" (click)="loginType='google'">🌐 Gmail</button>
        </div>

        <div *ngIf="loginType === 'password'" class="login-form">
          <input class="form-input" placeholder="Researcher Email" [(ngModel)]="email">
          <input class="form-input" [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="password">

          <button class="submit-btn" (click)="loginResearcherLogin()">Researcher Login</button>

          <div class="divider"><span>OR</span></div>

          <button class="google-btn" (click)="loginWithGooglePopup()">
            <img src="assets/img/google-icon.png">
            Login with Google
          </button>
        </div>

        <div *ngIf="loginType === 'google'" class="login-form">
          <button class="submit-btn" (click)="loginResearcherLogin()">Login</button>

          <div class="divider"><span>OR</span></div>

          <button class="google-btn" (click)="loginWithGooglePopup()">
            <img src="assets/img/google-icon.png">
            Login with Google
          </button>
        </div>
      </div>

      <!-- ================= ADMIN LOGIN ================= -->
      <div *ngIf="loginRole === 'admin'" class="login-form">
        <input type="email" placeholder="Admin Gmail" [(ngModel)]="adminEmail" class="form-input">
        <input [type]="showPassword ? 'text' : 'password'" placeholder="Admin Password" [(ngModel)]="adminPassword" class="form-input">

        <button class="submit-btn" (click)="loginAdmin()">Admin Login</button>

        <div class="divider"><span>OR</span></div>

        <button class="google-btn" (click)="loginWithGooglePopup()">
          <img src="assets/img/google-icon.png">
          Login with Google
        </button>
      </div>

      <div class="switch" *ngIf="loginRole === 'user'">
        Don't have an account? <a routerLink="/signup">Sign Up</a>
      </div>

    </div>
  </main>
</div>
