<div class="auth-page">
  <div class="auth-container">
    
    <!-- Robot with Eye Tracking -->
    <div class="robot-container">
      <svg width="200" height="200" viewBox="0 0 200 200" class="robot-svg">
        <rect x="50" y="30" width="100" height="100" rx="15"
          fill="#4a90e2" stroke="#2c5aa0" stroke-width="3"/>

        <circle cx="100" cy="20" r="8" fill="#ffd700"/>
        <rect x="95" y="20" width="10" height="10" fill="#ffd700"/>

        <circle cx="75" cy="70" r="15" fill="#ffffff"/>
        <circle [attr.cx]="75 + eyeLeftX" [attr.cy]="70 + eyeLeftY" r="8" fill="#2c3e50"/>
        <circle [attr.cx]="75 + eyeLeftX + 2" [attr.cy]="70 + eyeLeftY - 2" r="3" fill="#ffffff"/>

        <circle cx="125" cy="70" r="15" fill="#ffffff"/>
        <circle [attr.cx]="125 + eyeRightX" [attr.cy]="70 + eyeRightY" r="8" fill="#2c3e50"/>
        <circle [attr.cx]="125 + eyeRightX + 2" [attr.cy]="70 + eyeRightY - 2" r="3" fill="#ffffff"/>

        <rect x="80" y="110" width="40" height="8" rx="4" fill="#2c3e50"/>
      </svg>
    </div>

    <div class="form-wrapper">
      <form #f="ngForm" (ngSubmit)="onSubmit(f)" novalidate>
        <h2 class="auth-title">Create Account</h2>
        <!-- <p class="auth-subtitle">The robot is watching your progress!</p> -->

        <div class="input-group">
          <input name="name" placeholder="Full Name" [(ngModel)]="user.name" required class="form-input" />
          <span class="input-icon">👤</span>
        </div>

        <div class="input-group">
          <input type="email" name="email" placeholder="Email" [(ngModel)]="user.email" required class="form-input" />
          <span class="input-icon">✉️</span>
        </div>

        <div class="input-group">
          <input name="mobile" placeholder="Mobile Number" [(ngModel)]="user.mobile" required class="form-input" />
          <span class="input-icon">📞</span>
        </div>

        <div class="input-group">
          <input [type]="showPassword ? 'text' : 'password'" name="password" placeholder="Password" [(ngModel)]="user.password" required class="form-input" />
          <span class="eye-icon" (click)="togglePassword()">{{ showPassword ? '👁️' : '🙈' }}</span>
        </div>

        <div class="input-group">
          <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword" placeholder="Confirm Password" [(ngModel)]="user.confirmPassword" required class="form-input" />
          <span class="eye-icon" (click)="toggleConfirmPassword()">{{ showConfirmPassword ? '👁️' : '🙈' }}</span>
        </div>

        <button type="submit" [disabled]="loading || f.invalid" class="submit-btn">
          {{ loading ? 'Processing...' : 'Ready to Start' }}
        </button>
      </form>

      <div class="switch">
        Already have an account? <a routerLink="/login">Login</a>
      </div>
    </div>
  </div>
</div>
