<div class="ai-container">
  <div class="video-wrapper">
    <video 
      autoplay 
      muted 
      [muted]="true" 
      loop 
      playsinline 
      preload="auto"
      class="bg-video">
      <source src="assets/video/stock-footage-robot-thinking-using-virtual-interface-ai-chatbot.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
  </div>

  <main class="signup-card">
    <header class="glass-header">
      <div class="ai-pulse"></div>
      <h1>Sign in</h1>
      <p></p>
    </header>

    <div class="form-wrapper">
      <form #f="ngForm" (ngSubmit)="onSubmit(f)" novalidate>
        <h2 class="auth-title">Create Account</h2>

        <div class="input-group">
          <input name="name" placeholder="Full Name" [(ngModel)]="user.name" required class="form-input" />
          <span class="input-icon">👤</span>
          <div class="glow-border"></div>
        </div>

        <div class="input-group">
          <input type="email" name="email" placeholder="Email" [(ngModel)]="user.email" required class="form-input" />
          <span class="input-icon">✉️</span>
          <div class="glow-border"></div>
        </div>

        <div class="input-group">
          <input name="mobile" placeholder="Mobile Number" [(ngModel)]="user.mobile" required class="form-input" />
          <span class="input-icon">📞</span>
          <div class="glow-border"></div>
        </div>

        <div class="input-group">
          <input [type]="showPassword ? 'text' : 'password'" name="password" placeholder="Password" [(ngModel)]="user.password" required class="form-input" />
          <span class="eye-icon" (click)="togglePassword()">{{ showPassword ? '👁️' : '🙈' }}</span>
          <div class="glow-border"></div>
        </div>

        <div class="input-group">
          <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword" placeholder="Confirm Password" [(ngModel)]="user.confirmPassword" required class="form-input" />
          <span class="eye-icon" (click)="toggleConfirmPassword()">{{ showConfirmPassword ? '👁️' : '🙈' }}</span>
          <div class="glow-border"></div>
        </div>

        <button type="submit" [disabled]="loading || f.invalid" class="submit-btn">
          <span class="btn-text">{{ loading ? 'PROCESSING...' : 'Sign in' }}</span>
          <div class="btn-glow"></div>
        </button>
      </form>

      <div class="switch">
        Already have an account? <a routerLink="/login">Login</a>
      </div>
    </div>
  </main> 
</div>
